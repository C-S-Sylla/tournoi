<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tournoi Anime OP/ED - Résultats Finaux</title>
    <!-- Inclusion de html2canvas pour l'export d'image du schéma -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --primary: #6366f1; 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text: #f8fafc; 
        }
        body { 
            font-family: sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            text-align: center; 
            padding: 40px 20px;
        }
        .match-card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 15px; 
            width: 450px; 
            border: 3px solid transparent; 
            transition: 0.3s; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            margin: 0 auto;
        }
        .video-box { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 10px; 
            overflow: hidden; 
            margin-bottom: 10px; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.2rem; 
            font-weight: bold; 
            width: 100%; 
            transition: 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }

        .yt-link {
            display: inline-block;
            color: #38bdf8;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            background: rgba(56, 189, 248, 0.15);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            transition: 0.2s;
        }
        .yt-link:hover {
            background: rgba(56, 189, 248, 0.25);
            border-color: #38bdf8;
        }

        .switch-btn {
            background: #1e293b;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            width: auto;
            transition: 0.2s;
        }
        .switch-btn:hover {
            background: #334155;
            color: #f8fafc;
            border-color: #64748b;
        }

        /* Arbre de tournoi universel, centré et interactif */
        .bracket-scroll {
            width: 100%;
            max-height: 850px;
            overflow: hidden !important; /* Cache les barres de défilement */
            border: 1px solid #334155;
            background: #090d16;
            padding: 30px 15px;
            border-radius: 12px;
            margin: 20px 0;
            box-sizing: border-box;
            position: relative;
            cursor: grab;
            user-select: none;
            -ms-overflow-style: none;  /* IE/Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .bracket-scroll::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }
        .bracket-scroll:active {
            cursor: grabbing;
        }
        .bracket-wrapper {
            display: flex;
            gap: 25px;
            align-items: center;
            justify-content: flex-start; /* Aligné à gauche pour un calcul d'offset précis */
            width: max-content;
            position: relative;
            box-sizing: border-box;
            transform-origin: 0 0; /* Origine en haut à gauche pour le centrage mathématique */
        }
        .bracket-column {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 100%;
            width: 140px;
            position: relative;
            box-sizing: border-box;
            z-index: 2;
        }
        .bracket-node {
            width: 100%;
            height: 65px;
            background: #1e293b;
            border: 2px solid #475569;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            font-size: 0.7rem;
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
            transition: 0.2s;
        }
        .bracket-node img {
            width: 100%;
            height: 40px;
            object-fit: cover;
            border-bottom: 1px solid #334155;
        }
        .bracket-node .node-title {
            width: 100%;
            padding: 2px 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
            box-sizing: border-box;
            background: rgba(15, 23, 42, 0.95);
            color: #f8fafc;
        }
        .node-starred {
            border-color: #eab308 !important;
            box-shadow: 0 0 10px rgba(234, 179, 8, 0.5);
        }
        .node-starred .node-title {
            color: #eab308 !important;
            font-weight: bold;
        }

        /* Node tall (hauteur x2 pour les tours post-32èmes) */
        .bracket-node-tall {
            height: 105px !important;
        }
        .bracket-node-tall img {
            height: 80px !important;
        }

        /* Boutons d'actions du graphe */
        .download-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.2s;
            width: auto;
        }
        .download-btn:hover {
            background: #059669;
        }

        .fullscreen-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.2s;
            width: auto;
        }
        .fullscreen-btn:hover {
            background: #2563eb;
        }

        /* Plein écran stylisé pour l'arbre */
        #bracket-section-container:fullscreen {
            background: #090d16;
            padding: 30px;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            justify-content: center;
        }
        #bracket-section-container:fullscreen h3 {
            margin-top: 0;
            color: #38bdf8;
        }
        #bracket-section-container:fullscreen .bracket-scroll {
            max-height: none !important;
            height: 100% !important;
            border: none;
            background: transparent;
        }

        .recap-section {
            margin: 40px auto;
            text-align: left;
            max-width: 900px;
            width: 100%;
        }
        .recap-section h3 {
            color: #38bdf8;
            border-bottom: 2px solid #334155;
            padding-bottom: 8px;
            margin-bottom: 20px;
        }
        
        .fav-badge {
            background: rgba(234, 179, 8, 0.15);
            border: 1px solid rgba(234, 179, 8, 0.3);
            color: #fef08a;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .recap-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
        .recap-table th, .recap-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        .recap-table th {
            background-color: var(--primary);
            color: white;
            font-weight: bold;
        }
        .recap-table tr:hover { background-color: #334155; }
        
        .status-winner { color: #4ade80; font-weight: bold; }
        .status-finalist { color: #f43f5e; font-weight: bold; }

        .rounds-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 35px;
        }
        .round-box {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #334155;
        }
        .round-box h4 {
            margin: 0;
            color: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            padding: 5px;
            border-radius: 4px;
        }
        .round-box h4:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .round-matches-list {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }
        .match-recap-row {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .match-recap-num {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: bold;
            text-transform: uppercase;
        }
        .match-recap-player {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 110px;
        }
        .match-recap-player.winner { color: #4ade80; font-weight: bold; }
        .match-recap-player.loser { color: #64748b; text-decoration: line-through; }
        .match-recap-vs { color: #ef4444; font-weight: bold; font-size: 0.8rem; margin: 0 5px; }
    </style>
</head>
<body>

<div id="winner-screen" style="display: block;">
    <h1>🏆 VAINQUEUR FINAL 🏆</h1>
    <div class="match-card" style="margin: 0 auto; width: 600px; max-width: 100%;">
        <div class="video-box" id="player-winner"></div>
        <h2 id="title-winner">Titre</h2>
    </div>
    
    <!-- Conteneur global pour l'arbre et les classements -->
    <div id="tournament-recap-container"></div>
    
    <br>
    <button onclick="window.location.href='index.html'" style="width: auto; padding: 15px 40px; margin-top: 20px;">Retourner à l'Accueil</button>
</div>

<script>
    // Variables globales récupérées
    let winner = null;
    let matchHistory = [];
    let initialShuffled = [];

    // Variables de zoom/panning
    let zoomScale = 1.0;
    let panX = 0;
    let panY = 0;
    let isPanning = false;
    let startX = 0;
    let startY = 0;

    window.onload = () => {
        const storedResults = localStorage.getItem('finalResults');
        if (!storedResults) {
            alert("Aucun résultat de tournoi trouvé. Redirection vers l'accueil...");
            window.location.href = 'index.html';
            return;
        }

        const data = JSON.parse(storedResults);
        winner = data.winner;
        matchHistory = data.matchHistory;
        initialShuffled = data.initialShuffled;

        // Affiche le gagnant
        document.getElementById('title-winner').innerText = winner.title;
        if (winner.at) {
            document.getElementById('player-winner').innerHTML = `
                <div class="video-loader" id="video-loader-winner" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; color:#38bdf8; border-radius:10px;">
                    <span style="font-size:0.9rem; font-weight:bold;">Chargement de la vidéo du Champion... ⏳</span>
                </div>
                <div style="margin-top: 8px;">
                    <a class="yt-link" href="${winner.at}" target="_blank" style="background: rgba(16, 185, 129, 0.15); color: #10b981; border-color: rgba(16, 185, 129, 0.3);">
                        Ouvrir sur AnimeThemes ↗
                    </a>
                </div>
            `;
            loadWinnerAnimeThemesPlayer(winner);
        } else {
            document.getElementById('player-winner').innerHTML = getWinnerPlayerHTML(winner);
        }

        generateRecap();
    };

    function getWinnerPlayerHTML(entry) {
        if (entry.at) {
            const isDirectVideo = entry.at.match(/\.(webm|mp4|ogg)$/i);
            if (isDirectVideo) {
                return `
                    <video src="${entry.at}" controls autoplay muted style="width:100%; height:100%; object-fit:cover; border-radius:10px;"></video>
                    <div style="margin-top: 8px;">
                        <a class="yt-link" href="${entry.at}" target="_blank" style="background: rgba(16, 185, 129, 0.15); color: #10b981; border-color: rgba(16, 185, 129, 0.3);">
                            Ouvrir la Vidéo Directe ↗
                        </a>
                    </div>
                `;
            } else {
                return `
                    <iframe src="${entry.at}" allowfullscreen style="background: #000;"></iframe>
                    <div style="margin-top: 8px;">
                        <a class="yt-link" href="${entry.at}" target="_blank" style="background: rgba(16, 185, 129, 0.15); color: #10b981; border-color: rgba(16, 185, 129, 0.3);">
                            Ouvrir sur AnimeThemes ↗
                        </a>
                    </div>
                `;
            }
        }

        return `
            <iframe src="https://www.youtube-nocookie.com/embed/${entry.yt}?autoplay=1" allowfullscreen></iframe>
            <div style="margin-top: 8px; display: flex; flex-direction: column; gap: 5px; align-items: center;">
                <a class="yt-link" href="https://www.youtube.com/watch?v=${entry.yt}" target="_blank">
                    Ouvrir sur YouTube ↗
                </a>
                <button class="switch-btn" id="switch-btn-winner" onclick="switchWinnerPlayer('${entry.yt}')">
                    <span id="switch-text-winner">Lecteur alternatif si bloqué 🔁</span>
                </button>
            </div>
        `;
    }

    function switchWinnerPlayer(ytId) {
        const iframe = document.querySelector(`#player-winner iframe`);
        const textSpan = document.getElementById(`switch-text-winner`);
        if (!iframe || !textSpan) return;

        if (iframe.src.includes('youtube')) {
            iframe.src = `https://yewtu.be/embed/${ytId}`;
            textSpan.innerText = "Retourner au lecteur YouTube 🔁";
        } else {
            iframe.src = `https://www.youtube-nocookie.com/embed/${ytId}?autoplay=1`;
            textSpan.innerText = "Lecteur alternatif si bloqué 🔁";
        }
    }

    function toggleCollapse(id) {
        const el = document.getElementById(id);
        if (el.style.display === "none") {
            el.style.display = "grid";
        } else {
            el.style.display = "none";
        }
    }

    function toggleFullscreen() {
        const el = document.getElementById('bracket-section-container');
        if (!el) return;

        if (!document.fullscreenElement) {
            el.requestFullscreen().catch(err => {
                alert(`Erreur d'activation plein écran : ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    document.addEventListener('fullscreenchange', () => {
        const btn = document.querySelector('.fullscreen-btn');
        if (btn) {
            if (document.fullscreenElement) {
                btn.innerText = "❌ Quitter";
                btn.style.background = "#ef4444";
            } else {
                btn.innerText = "🖥️ Plein écran";
                btn.style.background = "#3b82f6";
            }
        }
        setTimeout(() => {
            autoFitBracket();
            drawBracketLines();
        }, 150);
    });

    function constrainBounds() {
        const scrollEl = document.querySelector('.bracket-scroll');
        const wrapperEl = document.querySelector('.bracket-wrapper');
        if (!scrollEl || !wrapperEl) return;

        const W_view = scrollEl.clientWidth;
        const H_view = scrollEl.clientHeight;
        
        const W_child = wrapperEl.offsetWidth;
        const H_child = wrapperEl.offsetHeight;

        const marginX = W_view * 0.5;
        const marginY = H_view * 0.5;

        const panX_min = marginX - (W_child * zoomScale);
        const panX_max = W_view - marginX;

        const panY_min = marginY - (H_child * zoomScale);
        const panY_max = H_view - marginY;

        panX = Math.max(panX_min, Math.min(panX, panX_max));
        panY = Math.max(panY_min, Math.min(panY, panY_max));
    }

    function applyZoomPan() {
        const wrapper = document.querySelector('.bracket-wrapper');
        if (!wrapper) return;
        constrainBounds();
        wrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomScale})`;
    }

    function autoFitBracket() {
        const scrollEl = document.querySelector('.bracket-scroll');
        const wrapperEl = document.querySelector('.bracket-wrapper');
        if (!scrollEl || !wrapperEl) return;

        const W_view = scrollEl.clientWidth;
        const H_view = scrollEl.clientHeight;

        const W_child = wrapperEl.offsetWidth;
        const H_child = wrapperEl.offsetHeight;

        const scaleX = W_view / W_child;
        const scaleY = H_view / H_child;

        zoomScale = Math.min(scaleX, scaleY) * 0.95;
        zoomScale = Math.max(zoomScale, 0.65); // Zoom de départ optimal

        panX = (W_view - W_child * zoomScale) / 2;
        panY = (H_view - H_child * zoomScale) / 2;

        applyZoomPan();
    }

    function initZoomPan() {
        const scrollEl = document.querySelector('.bracket-scroll');
        if (!scrollEl) return;

        zoomScale = 1.0;
        panX = 0;
        panY = 0;
        applyZoomPan();

        scrollEl.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            isPanning = true;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
            scrollEl.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            applyZoomPan();
        });

        window.addEventListener('mouseup', () => {
            if (isPanning) {
                isPanning = false;
                scrollEl.style.cursor = 'grab';
            }
        });

        scrollEl.addEventListener('wheel', (e) => {
            e.preventDefault();

            if (e.ctrlKey) {
                const zoomFactor = 1.08;
                if (e.deltaY < 0) {
                    zoomScale = Math.min(zoomScale * zoomFactor, 3.0);
                } else {
                    zoomScale = Math.max(zoomScale / zoomFactor, 0.15);
                }
            } else {
                panX -= e.deltaX;
                panY -= e.deltaY;
            }
            applyZoomPan();
        }, { passive: false });
    }

    // Génère l'Arbre Graphique Universel et Dynamique pour n'importe quelle taille N (Puissance de 2)
    function generateBracketVisual() {
        const tree = [];
        // Niveau 0 : Distribution initiale
        tree[0] = initialShuffled.map(e => ({ ...e }));

        const N = initialShuffled.length;
        const k = Math.log2(N); // Ex: 6 pour 64, 5 pour 32, 4 pour 16

        // Reconstitution mathématique des paliers intermédiaires
        for (let lvl = 1; lvl <= k; lvl++) {
            tree[lvl] = [];
            const prevLvl = tree[lvl - 1];
            for (let i = 0; i < prevLvl.length; i += 2) {
                const p1 = prevLvl[i];
                const p2 = prevLvl[i + 1];
                if (!p2) {
                    tree[lvl].push({ ...p1 });
                    continue;
                }
                
                const match = matchHistory.find(m => 
                    (m.p1.title === p1.title && m.p2.title === p2.title) ||
                    (m.p1.title === p2.title && m.p2.title === p1.title)
                );
                
                if (match) {
                    // Retrouve le morceau correspondant dans l'état de fin de jeu
                    const winnerObj = initialShuffled.find(e => e.title === match.winnerTitle) || p1;
                    tree[lvl].push({ ...winnerObj });
                } else {
                    tree[lvl].push({ title: "En attente", yt: "", placeholder: true });
                }
            }
        }
        
        // Distribution dynamique des colonnes de manière symétrique selon N
        const columns = {};
        // Partie Gauche de lvl 0 à k-1
        for (let j = 0; j < k; j++) {
            const halfSize = Math.pow(2, k - 1 - j);
            columns[`L-${j}`] = tree[j].slice(0, halfSize);
        }
        // Centre (Champion)
        columns[`C-${k}`] = tree[k];
        // Partie Droite de lvl k-1 à 0 (Inversée pour la symétrie)
        for (let j = k - 1; j >= 0; j--) {
            const halfSize = Math.pow(2, k - 1 - j);
            const fullSize = Math.pow(2, k - j);
            columns[`R-${j}`] = tree[j].slice(halfSize, fullSize);
        }

        // Calcul dynamique de la hauteur du bracket
        const wrapperHeight = (N / 2) * 75;

        let bracketHtml = `
            <div class="bracket-scroll">
                <div class="bracket-wrapper" style="height: ${wrapperHeight}px;">
                    <svg id="bracket-lines" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; stroke: #475569; stroke-width: 2; fill: none;"></svg>
        `;

        // Ordre de rendu strict pour respecter la symétrie
        const colOrder = [];
        for (let j = 0; j < k; j++) colOrder.push(`L-${j}`);
        colOrder.push(`C-${k}`);
        for (let j = k - 1; j >= 0; j--) colOrder.push(`R-${j}`);

        colOrder.forEach(colKey => {
            const list = columns[colKey];
            const [side, lvlStr] = colKey.split('-');
            const lvl = parseInt(lvlStr);
            
            bracketHtml += `<div class="bracket-column">`;
            
            list.forEach((node, idx) => {
                const nodeId = `${side}-${lvl}-${idx}`;
                
                // Une case n'est vide que si elle n'a ni ID YouTube, ni URL AnimeThemes
                const isPlaceholder = node.placeholder || (!node.yt && !node.at);
                
                // Génération propre de l'URL de miniature (YouTube ou image personnalisée AnimeThemes)
                let thumbUrl = "";
                if (node.yt) {
                    thumbUrl = `https://img.youtube.com/vi/${node.yt}/mqdefault.jpg`;
                } else if (node.thumb) {
                    // Utilisation du proxy d'image "images.weserv.nl" pour contourner le blocage de CORS du site d'origine (comme Fandom/Wikia)
                    thumbUrl = `https://images.weserv.nl/?url=${encodeURIComponent(node.thumb)}`;
                }
                
                const isStarred = node.starred;
                const isTall = lvl !== 0;
                
                bracketHtml += `
                    <div class="bracket-node ${isStarred ? 'node-starred' : ''} ${isTall ? 'bracket-node-tall' : ''}" id="${nodeId}">
                        ${isPlaceholder ? `
                            <div style="background: #0f172a; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #475569;">
                                <span>-</span>
                            </div>
                        ` : `
                            <!-- Affiche l'image si présente, ou une note de musique stylisée par défaut -->
                            ${thumbUrl 
                                ? `<img src="${thumbUrl}" crossorigin="anonymous" alt="" />` 
                                : `<div style="background: #1e293b; width: 100%; height: 40px; display:flex; align-items:center; justify-content:center; color:#64748b; font-size:1.2rem; border-bottom: 1px solid #334155;">🎵</div>`
                            }
                            <div class="node-title" title="${node.title}">
                                ${isStarred ? '⭐ ' : ''}${node.title}
                            </div>
                        `}
                    </div>
                `;
            });
            
            bracketHtml += `</div>`;
        });

        bracketHtml += `</div></div>`;
        return bracketHtml; // Retourne proprement la structure HTML construite
    }

    // Interroge l'API AnimeThemes pour trouver le fichier .webm brut
    // Convertit l'URL de la page en lien vidéo direct via l'API d'AnimeThemes (avec tri de résolution ascendante)
    async function resolveAnimeThemesVideo(animethemesUrl) {
        try {
            const urlObj = new URL(animethemesUrl);
            const pathParts = urlObj.pathname.split('/').filter(p => p);
            const animeSlug = pathParts[1]; // ex: "boruto"
            
            // Extraction du code du thème (ex: "ED19-NCBD1080" -> "ED19")
            const targetThemeSlug = pathParts[2].split('-')[0].toUpperCase();
            
            const response = await fetch(`https://api.animethemes.moe/anime/${animeSlug}?include=animethemes.animethemeentries.videos`);
            if (!response.ok) throw new Error("HTTP " + response.status);
            const json = await response.json();
            
            const themes = (json.anime && json.anime.animethemes) || [];
            
            // 1. Recherche du thème exact (ex: "ED19")
            const matchedTheme = themes.find(theme => theme.slug.toUpperCase() === targetThemeSlug);
            
            if (matchedTheme && matchedTheme.animethemeentries) {
                const allVideos = [];
                // Regroupe toutes les vidéos alternatives disponibles pour ce morceau
                for (const entry of matchedTheme.animethemeentries) {
                    if (entry.videos) {
                        allVideos.push(...entry.videos);
                    }
                }

                if (allVideos.length > 0) {
                    // TRI PHYSIQUE : Trie les vidéos par résolution croissante pour charger la plus légère d'abord (fast loading)
                    allVideos.sort((a, b) => {
                        const resA = a.resolution || 1080;
                        const resB = b.resolution || 1080;
                        return resA - resB;
                    });
                    return allVideos[0].link; // Renvoie l'URL du fichier .webm direct
                }
            }
            
            // 2. Recherche de secours en cas d'absence du thème structuré
            for (const theme of themes) {
                for (const entry of theme.animethemeentries || []) {
                    for (const video of entry.videos || []) {
                        const videoLink = video.link || "";
                        const videoBasename = video.basename || "";
                        if (videoLink.toLowerCase().includes(pathParts[2].toLowerCase()) || 
                            videoBasename.toLowerCase().includes(pathParts[2].toLowerCase())) {
                            return videoLink;
                        }
                    }
                }
            }
        } catch (e) {
            console.error("Erreur de récupération AnimeThemes API :", e);
        }
        return null;
    }

    // Gère le chargement asynchrone du lecteur du vainqueur
    async function loadWinnerAnimeThemesPlayer(winnerEntry) {
        const loader = document.getElementById('video-loader-winner');
        if (!loader) return;

        const videoLink = await resolveAnimeThemesVideo(winnerEntry.at);

        if (videoLink) {
            const parent = loader.parentElement;
            if (parent) {
                // CORRECTIF : Nous avons retiré l'attribut "muted" ici aussi
                parent.innerHTML = `
                    <video src="${videoLink}" controls autoplay style="width:100%; height:100%; object-fit:cover; border-radius:10px; background:#000;"></video>
                `;
            }
        } else {
            loader.innerHTML = `
                <div style="padding: 10px; color: #ef4444; font-size: 0.85rem; font-weight:bold; text-align:center;">
                    ⚠️ Résolution du Champion impossible.<br>
                    <a href="${winnerEntry.at}" target="_blank" style="display:inline-block; margin-top:8px; background:#ef4444; color:white; text-decoration:none; padding:6px 12px; border-radius:5px; font-size:0.8rem; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
                        Écouter sur AnimeThemes ↗
                    </a>
                </div>
            `;
        }
    }

    function drawBracketLines() {
        const svg = document.getElementById('bracket-lines');
        if (!svg) return;
        svg.innerHTML = ''; 

        const N = initialShuffled.length;
        const k = Math.log2(N);

        for (let lvl = 0; lvl < k - 1; lvl++) {
            const count = Math.pow(2, k - 1 - lvl);
            for (let i = 0; i < count; i++) {
                connectNodes(`L-${lvl}-${i}`, `L-${lvl+1}-${Math.floor(i/2)}`, svg);
            }
        }
        connectNodes(`L-${k-1}-0`, `C-${k}-0`, svg);

        for (let lvl = 0; lvl < k - 1; lvl++) {
            const count = Math.pow(2, k - 1 - lvl);
            for (let i = 0; i < count; i++) {
                connectNodes(`R-${lvl}-${i}`, `R-${lvl+1}-${Math.floor(i/2)}`, svg);
            }
        }
        connectNodes(`R-${k-1}-0`, `C-${k}-0`, svg);
    }

    function connectNodes(childId, parentId, svg) {
        const childEl = document.getElementById(childId);
        const parentEl = document.getElementById(parentId);
        if (!childEl || !parentEl) return;

        const childCol = childEl.parentElement;
        const parentCol = parentEl.parentElement;

        const childX = childCol.offsetLeft;
        const childY = childCol.offsetTop + childEl.offsetTop;
        const parentX = parentCol.offsetLeft;
        const parentY = parentCol.offsetTop + parentEl.offsetTop;

        const childW = childEl.offsetWidth;
        const childH = childEl.offsetHeight;
        const parentW = parentEl.offsetWidth;
        const parentH = parentEl.offsetHeight;

        const isLeftTree = childId.startsWith('L');
        let startX, startY, endX, endY;

        if (isLeftTree) {
            startX = childX + childW;
            startY = childY + childH / 2;
            endX = parentX;
            endY = parentY + parentH / 2;
        } else {
            startX = childX;
            startY = childY + childH / 2;
            endX = parentX + parentW;
            endY = parentY + parentH / 2;
        }

        const midX = (startX + endX) / 2;
        const pathData = `M ${startX} ${startY} L ${midX} ${startY} L ${midX} ${endY} L ${endX} ${endY}`;
        
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', pathData);
        path.setAttribute('stroke', '#475569');
        path.setAttribute('stroke-width', '2');
        path.setAttribute('fill', 'none');
        svg.appendChild(path);
    }

    function downloadBracket() {
        const container = document.querySelector('.bracket-wrapper');
        if (!container) return;

        const btn = document.querySelector('.download-btn');
        btn.innerText = "Génération... ⏳";
        btn.disabled = true;

        const originalTransform = container.style.transform;
        container.style.transform = 'none';

        html2canvas(container, {
            backgroundColor: "#090d16",
            useCORS: true, 
            scale: 1.5 
        }).then(canvas => {
            container.style.transform = originalTransform;

            const link = document.createElement('a');
            link.download = 'recap-tournoi.png';
            link.href = canvas.toDataURL();
            link.click();
            
            btn.innerText = "📸 Télécharger le Schéma (PNG)";
            btn.disabled = false;
        }).catch(err => {
            container.style.transform = originalTransform;
            console.error(err);
            btn.innerText = "Erreur ❌";
            btn.disabled = false;
        });
    }

    function generateRecap() {
        const starredEntries = initialShuffled.filter(e => e.starred);
        let starredHtml = "";
        if (starredEntries.length > 0) {
            starredHtml = `
                <div class="recap-section">
                    <h3>⭐ VOS MORCEAUX MARQUÉS (Étoilés)</h3>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                        ${starredEntries.map(e => `
                            <div class="fav-badge">⭐ ${e.title} <span style="font-size: 0.8rem; opacity: 0.75; margin-left:5px;">(${e.result})</span></div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        const bracketVisualHtml = `
            <div class="recap-section" id="bracket-section-container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap:10px;">
                    <h3>🌿 GRAPH SCHÉMATIQUE DU TOURNOI</h3>
                    <div style="display: flex; gap: 10px;">
                        <button class="fullscreen-btn" onclick="toggleFullscreen()">🖥️ Plein écran</button>
                        <button class="download-btn" onclick="downloadBracket()">📸 Télécharger le Schéma (PNG)</button>
                    </div>
                </div>
                ${generateBracketVisual()}
            </div>
        `;

        const N = initialShuffled.length;
        const roundsToRender = [];
        let temp = N;
        while (temp >= 2) {
            roundsToRender.push(temp);
            temp /= 2;
        }

        let bracketHtml = `
            <div class="recap-section">
                <h3>📜 HISTORIQUE DU COMPTE RENDU DES MATCHS</h3>
                <div class="rounds-container">
        `;

        roundsToRender.forEach(rSize => {
            const roundMatches = matchHistory.filter(m => m.roundSize === rSize);
            if (roundMatches.length === 0) return;

            const rTitle = getRoundTitle(rSize);
            const isCollapsedByDefault = rSize === 64 || rSize === 32;
            const displayStyle = isCollapsedByDefault ? "none" : "grid";

            bracketHtml += `
                <div class="round-box">
                    <h4 onclick="toggleCollapse('round-${rSize}')">
                        <span>${rTitle} (${roundMatches.length} Match${roundMatches.length > 1 ? 's' : ''})</span>
                        <span style="font-size: 0.8rem; opacity: 0.6; font-weight: normal;">[Cliquer pour afficher/masquer]</span>
                    </h4>
                    <div id="round-${rSize}" class="round-matches-list" style="display: ${displayStyle};">
                        ${roundMatches.map((m, i) => {
                            const isP1Winner = m.p1.title === m.winnerTitle;
                            return `
                                <div class="match-recap-row">
                                    <span class="match-recap-num">Match ${i + 1}</span>
                                    <div style="display: flex; justify-content: space-between; align-items: center; gap: 5px;">
                                        <span class="match-recap-player ${isP1Winner ? 'winner' : 'loser'}" title="${m.p1.title}">
                                            ${m.p1.starred ? '⭐ ' : ''}${m.p1.title}
                                        </span>
                                        <span class="match-recap-vs">VS</span>
                                        <span class="match-recap-player ${!isP1Winner ? 'winner' : 'loser'}" title="${m.p2.title}">
                                            ${m.p2.starred ? '⭐ ' : ''}${m.p2.title}
                                        </span>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        });

        bracketHtml += `</div></div>`;

        const rankWeight = {
            "🏆 CHAMPION 🏆": 1,
            "Finaliste (2ème)": 2,
            "Top 4 (Demi-Finales)": 3,
            "Top 8 (Quarts)": 4,
            "Top 16 (8èmes)": 5,
            "Top 32 (16èmes)": 6,
            "Top 64 (32èmes)": 7
        };

        const sortedEntries = [...initialShuffled].sort((a, b) => {
            return (rankWeight[a.result] || 9) - (rankWeight[b.result] || 9);
        });

let tableHtml = `
            <div class="recap-section">
                <h3>📊 CLASSEMENT GÉNÉRAL DES PARTICIPANTS</h3>
                <table class="recap-table">
                    <thead>
                        <tr>
                            <th style="width: 80px; text-align: center;">Marqué</th>
                            <th>Titre de l'Anime / Musique</th>
                            <th>Résultat / Parcours</th>
                            <th style="width: 140px; text-align: center;">Lien direct</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${sortedEntries.map(e => {
                            let statusClass = "";
                            if (e.result === "🏆 CHAMPION 🏆") statusClass = "status-winner";
                            else if (e.result === "Finaliste (2ème)") statusClass = "status-finalist";
                            
                            // CORRECTIF : Lien et texte dynamiques selon YouTube ou AnimeThemes
                            const directLink = e.yt ? `https://www.youtube.com/watch?v=${e.yt}` : (e.at || "#");
                            const linkText = e.yt ? "Regarder ↗" : "AnimeThemes ↗";
                            
                            return `
                                <tr>
                                    <td style="text-align: center; font-size: 1.1rem;">${e.starred ? '⭐' : '☆'}</td>
                                    <td style="font-weight: ${e.result === '🏆 CHAMPION 🏆' ? 'bold' : 'normal'}">${e.title}</td>
                                    <td class="${statusClass}">${e.result}</td>
                                    <td style="text-align: center;">
                                        <a class="yt-link" href="${directLink}" target="_blank" style="padding: 4px 8px; font-size: 0.8rem; margin: 0;">
                                            ${linkText}
                                        </a>
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        `;

        document.getElementById('tournament-recap-container').innerHTML = starredHtml + bracketVisualHtml + bracketHtml + tableHtml;

        setTimeout(() => {
            initZoomPan();
            autoFitBracket();
            drawBracketLines();
        }, 150);
    }

    function getRoundTitle(n) {
        if (n === 64) return "32èmes de Finale";
        if (n === 32) return "16èmes de Finale";
        if (n === 16) return "8èmes de Finale";
        if (n === 8) return "Quarts de Finale";
        if (n === 4) return "Demi-Finales";
        if (n === 2) return "GRANDE FINALE";
        return `Tour de ${n}`;
    }

    window.addEventListener('resize', () => {
        autoFitBracket();
        drawBracketLines();
    });
</script>
