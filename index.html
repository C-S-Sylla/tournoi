<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tournoi Anime OP/ED - Menu de Configuration</title>
    <style>
        :root { 
            --primary: #6366f1; 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text: #f8fafc; 
        }
        body { 
            font-family: sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            text-align: center; 
            padding: 20px;
        }
        
        /* Styles du Menu de configuration */
        #menu-screen {
            max-width: 600px;
            margin: 50px auto;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        .menu-group {
            margin-bottom: 25px;
            text-align: left;
        }
        .menu-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #38bdf8;
            font-size: 1.05rem;
        }
        .menu-select, .menu-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.2s;
        }
        .menu-select:focus, .menu-input:focus {
            border-color: var(--primary);
        }
        .radio-group {
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }
        .radio-group input[type="radio"] {
            display: none;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: #0f172a;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            transition: 0.2s;
            flex: 1;
            justify-content: center;
            font-weight: bold;
            user-select: none;
        }
        .radio-label:hover {
            border-color: var(--primary);
        }
        .radio-group input[type="radio"]:checked + .radio-label {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.2rem; 
            font-weight: bold; 
            width: 100%; 
            transition: 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }

        #available-count {
            margin-top: 20px; 
            font-size: 0.9rem; 
            color: #94a3b8; 
            line-height: 1.5; 
            background: #0f172a; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            white-space: pre-line;
        }
    </style>
</head>
<body>

<div id="menu-screen">
    <h2 style="color: #38bdf8; margin-top: 0;">🎵 MENU DE CONFIGURATION 🎵</h2>
    <p style="color: #94a3b8; font-size: 0.9rem;">Préparez vos paramètres de saison avant de démarrer la compétition.</p>
    <br>

    <div class="menu-group">
        <label for="season-select">1. Sélectionner la Saison :</label>
        <select id="season-select" class="menu-select" onchange="onSeasonChange()">
            <!-- Les options sont peuplées dynamiquement par JS -->
        </select>
    </div>

    <div class="menu-group" id="json-upload-group" style="display: none;">
        <label for="custom-json-file">Charger le fichier JSON personnalisé :</label>
        <input type="file" id="custom-json-file" class="menu-input" accept=".json" onchange="loadCustomJson(event)">
    </div>

    <div class="menu-group">
        <label>2. Catégorie des musiques :</label>
        <div class="radio-group">
            <input type="radio" id="cat-mix" name="category" value="MIX" checked onchange="updateCountLabel()">
            <label for="cat-mix" class="radio-label">Mix (OP + ED)</label>

            <input type="radio" id="cat-op" name="category" value="OP" onchange="updateCountLabel()">
            <label for="cat-op" class="radio-label">Openings</label>

            <input type="radio" id="cat-ed" name="category" value="ED" onchange="updateCountLabel()">
            <label for="cat-ed" class="radio-label">Endings</label>
        </div>
    </div>

    <div class="menu-group">
        <label for="tournament-size-select">3. Taille du Tournoi :</label>
        <select id="tournament-size-select" class="menu-select">
            <option value="64">64 Participants</option>
            <option value="32">32 Participants</option>
            <option value="16">16 Participants</option>
        </select>
    </div>

    <div id="available-count">
        Chargement des informations de saison...
    </div>

    <br>
    <button onclick="initTournament()">LANCER LE TOURNOI</button>
</div>

<script>
    // --- CONFIGURATION DES CHEMINS DES PRÉSETS ---
    const presetSeasons = [
        { id: "summer_2026_mix", name: "Été 2026", path: "data/summer-2026-mix.json" },
        { id: "automne_2019", name: "Automne 2019", path: "data/automne_2019.json" },
        { id: "summer_2019", name: "Été 2019", path: "data/summer_2019.json" },
        { id: "winter_2020", name: "Hiver 2020", path: "data/winter_2020.json" },
        { id: "winter_2022", name: "Hiver 2022", path: "data/winter_2022.json" },
        { id: "fall_2023", name: "Automne 2023", path: "data/fall_2023.json" },
        { id: "underrated_ed", name: "Underrated ED", path: "data/underrated ED.json" }
    ];

    let selectedSeasonData = null;

    // Peuple le sélecteur d'accueil
    function initMenu() {
        const select = document.getElementById('season-select');
        select.innerHTML = '';

        presetSeasons.forEach(season => {
            const opt = document.createElement('option');
            opt.value = season.id;
            opt.innerText = season.name;
            select.appendChild(opt);
        });

        const customOpt = document.createElement('option');
        customOpt.value = "custom";
        customOpt.innerText = "Uploader votre fichier JSON de saison (.json)";
        select.appendChild(customOpt);

        onSeasonChange();
    }

    // Normalise l'importation de chaque morceau
function normalizeEntry(entry, index) {
        let title = entry.title || entry.name || entry.song || entry.label || `Entrée ${index + 1}`;
        const yt = entry.yt || entry.youtube || entry.youtubeId || entry.videoId || entry.id || entry.url || "";
        
        // CORRECTION : On récupère et conserve le lien AnimeThemes et la miniature personnalisée
        const at = entry.at || ""; 
        const thumb = entry.thumb || ""; 

        const rawType = entry.type || entry.category || entry.kind || "";
        const titleText = `${title} ${rawType}`.toUpperCase();

        let type = "OP";
        if (rawType === "ED" || rawType === "ending" || rawType === "Ending" || titleText.includes("(ED)") || titleText.includes("ENDING")) {
            type = "ED";
        } else if (rawType === "MIX" || rawType === "mix") {
            type = "MIX";
        }

        if (type === "OP" && !title.toUpperCase().includes("(OP)")) {
            title = `${title} (OP)`;
        } else if (type === "ED" && !title.toUpperCase().includes("(ED)")) {
            title = `${title} (ED)`;
        }

        return {
            title,
            yt,
            at,       // CORRECTION : Sauvegardé
            thumb,    // CORRECTION : Sauvegardé
            type,
            starred: false,
            result: ""
        };
    }

    function normalizeSeasonData(raw, fallbackName) {
        if (Array.isArray(raw)) {
            return { seasonName: fallbackName || "Saison importée", entries: raw };
        }

        if (raw && typeof raw === "object") {
            const possibleArrays = [raw.entries, raw.items, raw.data, raw.tracks, raw.songs, raw.musics]
                .filter(Array.isArray);
            const source = possibleArrays[0] || [];
            return {
                seasonName: raw.seasonName || raw.name || raw.title || fallbackName || "Saison importée",
                entries: source
            };
        }

        return { seasonName: fallbackName || "Saison importée", entries: [] };
    }

    function parseEntries(entries) {
        if (!Array.isArray(entries)) return [];
        return entries.map((entry, index) => normalizeEntry(entry, index));
    }

    function getSelectedEntries() {
        if (selectedSeasonData && Array.isArray(selectedSeasonData.entries)) {
            return parseEntries(selectedSeasonData.entries);
        }
        return [];
    }

    function updateCountLabel() {
        const parsed = getSelectedEntries();
        const total = parsed.length;
        const ops = parsed.filter(e => e.type === "OP").length;
        const eds = parsed.filter(e => e.type === "ED").length;
        const name = selectedSeasonData ? selectedSeasonData.seasonName : "Aucune saison";

        document.getElementById('available-count').innerText =
            `Saison chargée : ${name}\n` +
            `Contenu total : ${total} morceaux  |  Openings : ${ops}  |  Endings : ${eds}`;
    }

    async function loadPresetSeason(id) {
        const season = presetSeasons.find(s => s.id === id);
        if (!season) return;

        try {
            const response = await fetch(season.path);
            if (!response.ok) throw new Error("HTTP " + response.status);
            const data = await response.json();
            selectedSeasonData = normalizeSeasonData(data, season.name);
            updateCountLabel();
        } catch (error) {
            console.error("Erreur de chargement fetch :", error);
            selectedSeasonData = null;
            document.getElementById('available-count').innerText = 
                `⚠️ Impossible de charger "${season.name}" automatiquement (Restriction de sécurité locale / CORS).\n` +
                `👉 Veuillez choisir l'option "Uploader votre fichier" et sélectionner le fichier depuis votre dossier "data/"`;
        }
    }

    async function onSeasonChange() {
        const select = document.getElementById('season-select');
        const uploadGroup = document.getElementById('json-upload-group');
        
        if (select.value === "custom") {
            uploadGroup.style.display = "block";
            selectedSeasonData = null;
            document.getElementById('available-count').innerText = "Veuillez uploader un fichier JSON.";
        } else {
            uploadGroup.style.display = "none";
            await loadPresetSeason(select.value);
        }
    }

    function loadCustomJson(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                selectedSeasonData = normalizeSeasonData(data, file.name.replace(/\.json$/i, ""));
                alert(`Saison "${selectedSeasonData.seasonName}" chargée avec succès ! (${selectedSeasonData.entries.length} morceaux détectés)`);
                updateCountLabel();
            } catch (err) {
                alert("Erreur lors de la lecture du fichier JSON : " + err.message);
                event.target.value = "";
            }
        };
        reader.readAsText(file);
    }

    function initTournament() {
        if (!selectedSeasonData || !Array.isArray(selectedSeasonData.entries) || selectedSeasonData.entries.length === 0) {
            alert("Veuillez d'abord charger un fichier de saison valide.");
            return;
        }

        const category = document.querySelector('input[name="category"]:checked').value;
        let parsed = getSelectedEntries();

        if (category === "OP") {
            parsed = parsed.filter(e => e.type === "OP");
        } else if (category === "ED") {
            parsed = parsed.filter(e => e.type === "ED");
        }

        let selectedSize = parseInt(document.getElementById('tournament-size-select').value);

        if (parsed.length === 0) {
            alert("Aucun morceau ne correspond aux critères choisis dans cette saison !");
            return;
        }

        parsed.sort(() => Math.random() - 0.5);

        if (parsed.length < selectedSize) {
            const powers = [64, 32, 16, 8, 4, 2];
            const targetPower = powers.find(p => p <= parsed.length) || 2;
            alert(`Données insuffisantes (${parsed.length} morceaux). Le tournoi est automatiquement ajusté à ${targetPower} participants.`);
            selectedSize = targetPower;
        }

        const finalEntries = parsed.slice(0, selectedSize);

        finalEntries.forEach(entry => {
            entry.starred = false;
            entry.result = `Top ${selectedSize}`;
        });

        // NETTOYAGE ET TRANSFERT VIA LOCALSTORAGE
        localStorage.removeItem('tournamentParticipants');
        localStorage.removeItem('tournamentSize');
        localStorage.removeItem('matchHistory');
        localStorage.removeItem('historyStateStack');
        localStorage.removeItem('finalResults');

        localStorage.setItem('tournamentParticipants', JSON.stringify(finalEntries));
        localStorage.setItem('tournamentSize', selectedSize);

        // REDIRECTION VERS L'ECRAN DE JEU
        window.location.href = 'tournament.html';
    }

    initMenu();
</script>
</body>
</html>
