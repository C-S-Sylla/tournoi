<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tournoi Anime OP/ED - Multi-Saisons</title>
    <!-- Inclusion de html2canvas pour l'export d'image du schéma -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --primary: #6366f1; 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text: #f8fafc; 
        }
        body { 
            font-family: sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            text-align: center; 
        }
        .header { 
            padding: 20px; 
            background: #1e293b; 
            margin-bottom: 20px; 
        }
        .container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            padding: 20px; 
            flex-wrap: wrap; 
        }
        .match-card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 15px; 
            width: 450px; 
            border: 3px solid transparent; 
            transition: 0.3s; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .match-card:hover { 
            border-color: var(--primary); 
        }
        .video-box { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 10px; 
            overflow: hidden; 
            margin-bottom: 10px; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.2rem; 
            font-weight: bold; 
            width: 100%; 
            transition: 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        .vs { 
            font-size: 3rem; 
            align-self: center; 
            color: #ef4444; 
            font-weight: bold; 
        }
        #winner-screen { 
            display: none; 
            padding: 50px 20px; 
        }
        .hidden { 
            display: none !important; 
        }

        /* Styles du Menu de configuration */
        #menu-screen {
            max-width: 600px;
            margin: 50px auto;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        .menu-group {
            margin-bottom: 25px;
            text-align: left;
        }
        .menu-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #38bdf8;
            font-size: 1.05rem;
        }
        .menu-select, .menu-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.2s;
        }
        .menu-select:focus, .menu-input:focus {
            border-color: var(--primary);
        }
        .radio-group {
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }
        .radio-group input[type="radio"] {
            display: none;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: #0f172a;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            transition: 0.2s;
            flex: 1;
            justify-content: center;
            font-weight: bold;
            user-select: none;
        }
        .radio-label:hover {
            border-color: var(--primary);
        }
        .radio-group input[type="radio"]:checked + .radio-label {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Styles du Lecteur et Boutons interactifs */
        .star-btn { 
            background: #475569; 
            color: #e2e8f0; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: bold; 
            margin-bottom: 12px; 
            width: 100%; 
            transition: 0.2s;
        }
        .star-btn:hover { background: #64748b; }
        .star-btn.starred { background: #eab308; color: #0f172a; }
        
        .yt-link {
            display: inline-block;
            color: #38bdf8;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            background: rgba(56, 189, 248, 0.15);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            transition: 0.2s;
        }
        .yt-link:hover {
            background: rgba(56, 189, 248, 0.25);
            border-color: #38bdf8;
        }

        .switch-btn {
            background: #1e293b;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            width: auto;
            transition: 0.2s;
        }
        .switch-btn:hover {
            background: #334155;
            color: #f8fafc;
            border-color: #64748b;
        }

        /* Bouton Retour en arrière */
        .undo-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin: 10px auto;
            transition: 0.2s;
            display: none;
        }
        .undo-btn:hover {
            background: #dc2626;
        }

        /* Arbre de tournoi universel */
        .bracket-scroll {
            width: 100%;
            max-height: 850px;
            overflow: auto;
            border: 1px solid #334155;
            background: #090d16;
            padding: 30px 15px;
            border-radius: 12px;
            margin: 20px 0;
            box-sizing: border-box;
        }
        .bracket-wrapper {
            display: flex;
            gap: 25px;
            align-items: center;
            justify-content: center;
            width: max-content;
            min-width: 100%;
            position: relative;
            box-sizing: border-box;
        }
        .bracket-column {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 100%;
            width: 140px;
            position: relative;
            box-sizing: border-box;
            z-index: 2;
        }
        .bracket-node {
            width: 100%;
            height: 65px;
            background: #1e293b;
            border: 2px solid #475569;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            font-size: 0.7rem;
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
            transition: 0.2s;
        }
        .bracket-node img {
            width: 100%;
            height: 40px;
            object-fit: cover;
            border-bottom: 1px solid #334155;
        }
        .bracket-node .node-title {
            width: 100%;
            padding: 2px 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
            box-sizing: border-box;
            background: rgba(15, 23, 42, 0.95);
            color: #f8fafc;
        }
        .node-starred {
            border-color: #eab308 !important;
            box-shadow: 0 0 10px rgba(234, 179, 8, 0.5);
        }
        .node-starred .node-title {
            color: #eab308 !important;
            font-weight: bold;
        }

        /* Node tall (hauteur x2 pour les tours post-32èmes) */
        .bracket-node-tall {
            height: 105px !important;
        }
        .bracket-node-tall img {
            height: 80px !important;
        }

        /* Bouton Télécharger */
        .download-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.2s;
        }
        .download-btn:hover {
            background: #059669;
        }

        .recap-section {
            margin: 40px auto;
            text-align: left;
            max-width: 900px;
            width: 100%;
        }
        .recap-section h3 {
            color: #38bdf8;
            border-bottom: 2px solid #334155;
            padding-bottom: 8px;
            margin-bottom: 20px;
        }
        
        .fav-badge {
            background: rgba(234, 179, 8, 0.15);
            border: 1px solid rgba(234, 179, 8, 0.3);
            color: #fef08a;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .recap-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
        .recap-table th, .recap-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        .recap-table th {
            background-color: var(--primary);
            color: white;
            font-weight: bold;
        }
        .recap-table tr:hover { background-color: #334155; }
        
        .status-winner { color: #4ade80; font-weight: bold; }
        .status-finalist { color: #f43f5e; font-weight: bold; }

        .rounds-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 35px;
        }
        .round-box {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #334155;
        }
        .round-box h4 {
            margin: 0;
            color: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            padding: 5px;
            border-radius: 4px;
        }
        .round-box h4:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .round-matches-list {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }
        .match-recap-row {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .match-recap-num {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: bold;
            text-transform: uppercase;
        }
        .match-recap-player {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 110px;
        }
        .match-recap-player.winner { color: #4ade80; font-weight: bold; }
        .match-recap-player.loser { color: #64748b; text-decoration: line-through; }
        .match-recap-vs { color: #ef4444; font-weight: bold; font-size: 0.8rem; margin: 0 5px; }
    </style>
</head>
<body>

<!-- EN-TÊTE DU TOURNOI -->
<div class="header hidden">
    <h1 id="round-name">Chargement...</h1>
    <p id="match-info">Match 1 / 32</p>
    <button id="undo-btn" class="undo-btn" onclick="undo()">↩ Revenir en arrière</button>
</div>

<!-- CONFIGURATION INITIALE ET MENU -->
<div id="menu-screen">
    <h2 style="color: #38bdf8; margin-top: 0;">🎵 MENU DE CONFIGURATION 🎵</h2>
    <p style="color: #94a3b8; font-size: 0.9rem;">Préparez vos paramètres avant de démarrer la compétition.</p>
    <br>

    <div class="menu-group">
        <label for="season-select">1. Sélectionner la Saison :</label>
        <select id="season-select" class="menu-select" onchange="onSeasonChange()">
            <option value="summer_2026">Été 2026 (Intégré par défaut)</option>
            <option value="custom">Uploader votre fichier JSON de saison (.json)</option>
        </select>
    </div>

    <div class="menu-group" id="json-upload-group" style="display: none;">
        <label for="custom-json-file">Charger le fichier JSON personnalisé :</label>
        <input type="file" id="custom-json-file" class="menu-input" accept=".json" onchange="loadCustomJson(event)">
    </div>

    <div class="menu-group">
        <label>2. Catégorie des musiques :</label>
        <div class="radio-group">
            <input type="radio" id="cat-mix" name="category" value="MIX" checked onchange="updateCountLabel()">
            <label for="cat-mix" class="radio-label">Mix (OP + ED)</label>

            <input type="radio" id="cat-op" name="category" value="OP" onchange="updateCountLabel()">
            <label for="cat-op" class="radio-label">Openings</label>

            <input type="radio" id="cat-ed" name="category" value="ED" onchange="updateCountLabel()">
            <label for="cat-ed" class="radio-label">Endings</label>
        </div>
    </div>

    <div class="menu-group">
        <label for="tournament-size-select">3. Taille du Tournoi :</label>
        <select id="tournament-size-select" class="menu-select">
            <option value="64">64 Participants</option>
            <option value="32">32 Participants</option>
            <option value="16">16 Participants</option>
        </select>
    </div>

    <div id="available-count" style="margin-top: 20px; font-size: 0.9rem; color: #94a3b8; line-height: 1.5; background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155;">
        Chargement des informations de saison...
    </div>

    <br>
    <button onclick="initTournament()" style="padding: 15px; width: 100%;">LANCER LE TOURNOI 🚀</button>
</div>

<!-- ÉCRAN DU TOURNOI EN COURS -->
<div id="tournament-screen" class="hidden">
    <div class="container" id="tournament-area">
        <div class="match-card">
            <div class="video-box" id="player1"></div>
            <h3 id="title1">Anime A</h3>
            <button id="star-0" class="star-btn" onclick="toggleStar(0)">☆ Marquer ?</button>
            <button onclick="vote(0)">CHOISIR</button>
        </div>

        <div class="vs">VS</div>

        <div class="match-card">
            <div class="video-box" id="player2"></div>
            <h3 id="title2">Anime B</h3>
            <button id="star-1" class="star-btn" onclick="toggleStar(1)">☆ Marquer ?</button>
            <button onclick="vote(1)">CHOISIR</button>
        </div>
    </div>
</div>

<!-- ÉCRAN DE FIN DE TOURNOI -->
<div id="winner-screen">
    <h1>🏆 VAINQUEUR FINAL 🏆</h1>
    <div class="match-card" style="margin: 0 auto; width: 600px; max-width: 100%;">
        <div class="video-box" id="player-winner"></div>
        <h2 id="title-winner">Titre</h2>
    </div>
    
    <!-- Conteneur global pour le graphique de l'arbre, les favoris et l'historique -->
    <div id="tournament-recap-container"></div>
    
    <br>
    <button onclick="location.reload()" style="width: auto; padding: 15px 40px; margin-top: 20px;">Recommencer le tournoi</button>
</div>

        { title: "LV999 no Murabito (ED)", yt: "MgIol7kDcTE" }
    ];

    // Variables globales du jeu
    let currentRound = [];
    const initialShuffled = []; // Sauvegarde exacte de la distribution de départ
    let nextRound = [];
    let currentIndex = 0;
    const matchHistory = []; 
    const historyStateStack = [];

    // Gestion de la saison active
    let selectedSeasonData = { seasonName: "Été 2026 (Intégré)", entries: defaultEntries };

    // Parse et segmente les entrées en OP ou ED si l'attribut "type" n'est pas présent
    function parseEntries(entries) {
        return entries.map(entry => {
            let type = entry.type;
            if (!type) {
                if (entry.title.toUpperCase().includes("(OP)")) {
                    type = "OP";
                } else if (entry.title.toUpperCase().includes("(ED)")) {
                    type = "ED";
                } else {
                    type = "OP"; // Fallback par défaut
                }
            }
            return {
                title: entry.title,
                yt: entry.yt,
                type: type,
                starred: false,
                result: ""
            };
        });
    }

    // Met à jour les statistiques de sélection sur l'écran d'accueil
    function updateCountLabel() {
        const rawEntries = selectedSeasonData ? selectedSeasonData.entries : defaultEntries;
        const parsed = parseEntries(rawEntries);
        
        const total = parsed.length;
        const ops = parsed.filter(e => e.type === "OP").length;
        const eds = parsed.filter(e => e.type === "ED").length;

        const name = selectedSeasonData ? selectedSeasonData.seasonName : "Été 2026 (Intégré)";

        document.getElementById('available-count').innerText = 
            `Saison chargée : ${name}\n` +
            `Contenu total : ${total} morceaux  |  Openings : ${ops}  |  Endings : ${eds}`;
    }

    // Gestion du changement de saison
    function onSeasonChange() {
        const select = document.getElementById('season-select');
        const uploadGroup = document.getElementById('json-upload-group');
        
        if (select.value === "custom") {
            uploadGroup.style.display = "block";
            selectedSeasonData = null; // En attente du fichier uploade
            document.getElementById('available-count').innerText = "Veuillez uploader un fichier JSON.";
        } else {
            uploadGroup.style.display = "none";
            selectedSeasonData = { seasonName: "Été 2026 (Intégré)", entries: defaultEntries };
            updateCountLabel();
        }
    }

    // Charge un fichier JSON local
    function loadCustomJson(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (!data.entries || !Array.isArray(data.entries)) {
                    throw new Error("Le format JSON doit contenir une clé 'entries' de type tableau.");
                }
                selectedSeasonData = data;
                alert(`Saison "${data.seasonName || 'Importée'}" chargée avec succès ! (${data.entries.length} morceaux détectés)`);
                updateCountLabel();
            } catch (err) {
                alert("Erreur lors de la lecture du fichier JSON : " + err.message);
                event.target.value = ""; // Reset
            }
        };
        reader.readAsText(file);
    }

    // Démarre et initialise le tournoi
    function initTournament() {
        if (!selectedSeasonData) {
            alert("Veuillez d'abord charger un fichier JSON valide pour cette saison.");
            return;
        }

        const category = document.querySelector('input[name="category"]:checked').value;
        const rawEntries = selectedSeasonData.entries;
        let parsed = parseEntries(rawEntries);

        // Filtrer les morceaux
        if (category === "OP") {
            parsed = parsed.filter(e => e.type === "OP");
        } else if (category === "ED") {
            parsed = parsed.filter(e => e.type === "ED");
        }

        let selectedSize = parseInt(document.getElementById('tournament-size-select').value);

        if (parsed.length === 0) {
            alert("Aucun morceau ne correspond aux critères choisis dans cette saison !");
            return;
        }

        // Mélange aléatoire
        parsed.sort(() => Math.random() - 0.5);

        // Ajustement automatique de la taille si les données sont insuffisantes
        if (parsed.length < selectedSize) {
            const powers = [64, 32, 16, 8, 4, 2];
            const targetPower = powers.find(p => p <= parsed.length) || 2;
            alert(`Données insuffisantes (${parsed.length} morceaux). Le tournoi est automatiquement ajusté à ${targetPower} participants.`);
            selectedSize = targetPower;
        }

        // Sélectionner les morceaux finaux pour le tournoi
        const finalEntries = parsed.slice(0, selectedSize);

        finalEntries.forEach(entry => {
            entry.starred = false;
            entry.result = `Top ${selectedSize}`;
        });

        currentRound = [...finalEntries];
        initialShuffled.length = 0;
        initialShuffled.push(...currentRound);
        nextRound = [];
        currentIndex = 0;
        matchHistory.length = 0;
        historyStateStack.length = 0;

        // Passage à l'écran de jeu
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('tournament-screen').classList.remove('hidden');
        document.querySelector('.header').classList.remove('hidden');

        updateDisplay();
    }

    function updateDisplay() {
        if (currentRound.length === 1) {
            showWinner(currentRound[0]);
            return;
        }

        // Gestion du bouton de retour en arrière
        const undoBtn = document.getElementById('undo-btn');
        if (historyStateStack.length > 0) {
            undoBtn.style.display = 'inline-block';
        } else {
            undoBtn.style.display = 'none';
        }

        document.getElementById('round-name').innerText = getRoundTitle(currentRound.length);
        document.getElementById('match-info').innerText = `Match ${(currentIndex/2)+1} / ${currentRound.length/2}`;

        const choice1 = currentRound[currentIndex];
        const choice2 = currentRound[currentIndex + 1];

        document.getElementById('title1').innerText = choice1.title;
        document.getElementById('title2').innerText = choice2.title;

        updateStarButtonState(0, choice1.starred);
        updateStarButtonState(1, choice2.starred);

        document.getElementById('player1').innerHTML = `
            <iframe src="https://www.youtube-nocookie.com/embed/${choice1.yt}?rel=0" allowfullscreen></iframe>
            <div style="margin-top: 8px; display: flex; flex-direction: column; gap: 5px; align-items: center;">
                <a class="yt-link" href="https://www.youtube.com/watch?v=${choice1.yt}" target="_blank">
                    Ouvrir sur YouTube ↗ (si vidéo bloquée)
                </a>
                <button class="switch-btn" onclick="switchPlayer(0, '${choice1.yt}')">
                    <span id="switch-text-0">Lecteur alternatif si bloqué 🔁</span>
                </button>
            </div>
        `;
        document.getElementById('player2').innerHTML = `
            <iframe src="https://www.youtube-nocookie.com/embed/${choice2.yt}?rel=0" allowfullscreen></iframe>
            <div style="margin-top: 8px; display: flex; flex-direction: column; gap: 5px; align-items: center;">
                <a class="yt-link" href="https://www.youtube.com/watch?v=${choice2.yt}" target="_blank">
                    Ouvrir sur YouTube ↗ (si vidéo bloquée)
                </a>
                <button class="switch-btn" onclick="switchPlayer(1, '${choice2.yt}')">
                    <span id="switch-text-1">Lecteur alternatif si bloqué 🔁</span>
                </button>
            </div>
        `;
    }

    function switchPlayer(index, ytId) {
        const iframe = document.querySelector(`#player${index + 1} iframe`);
        const textSpan = document.getElementById(`switch-text-${index}`);
        if (!iframe || !textSpan) return;

        if (iframe.src.includes('youtube')) {
            iframe.src = `https://yewtu.be/embed/${ytId}`;
            textSpan.innerText = "Retourner au lecteur YouTube 🔁";
        } else {
            iframe.src = `https://www.youtube-nocookie.com/embed/${ytId}?rel=0`;
            textSpan.innerText = "Lecteur alternatif si bloqué 🔁";
        }
    }

    function switchWinnerPlayer(ytId) {
        const iframe = document.querySelector(`#player-winner iframe`);
        const textSpan = document.getElementById(`switch-text-winner`);
        if (!iframe || !textSpan) return;

        if (iframe.src.includes('youtube')) {
            iframe.src = `https://yewtu.be/embed/${ytId}`;
            textSpan.innerText = "Retourner au lecteur YouTube 🔁";
        } else {
            iframe.src = `https://www.youtube-nocookie.com/embed/${ytId}?autoplay=1`;
            textSpan.innerText = "Lecteur alternatif si bloqué 🔁";
        }
    }

    function toggleStar(indexOffset) {
        const entry = currentRound[currentIndex + indexOffset];
        entry.starred = !entry.starred;
        updateStarButtonState(indexOffset, entry.starred);
    }

    function updateStarButtonState(indexOffset, isStarred) {
        const btn = document.getElementById(`star-${indexOffset}`);
        if (isStarred) {
            btn.classList.add('starred');
            btn.innerText = "⭐ Marqué !";
        } else {
            btn.classList.remove('starred');
            btn.innerText = "☆ Marquer ?";
        }
    }

    function saveState() {
        historyStateStack.push({
            currentRound: currentRound.map(e => ({ ...e })),
            nextRound: nextRound.map(e => ({ ...e })),
            currentIndex: currentIndex,
            matchHistory: matchHistory.map(m => ({
                roundSize: m.roundSize,
                p1: { ...m.p1 },
                p2: { ...m.p2 },
                winnerTitle: m.winnerTitle
            })),
            selectedSeasonData: JSON.parse(JSON.stringify(selectedSeasonData))
        });
    }

    function undo() {
        if (historyStateStack.length === 0) return;

        const prevState = historyStateStack.pop();

        currentRound = prevState.currentRound;
        nextRound = prevState.nextRound;
        currentIndex = prevState.currentIndex;

        matchHistory.length = 0;
        matchHistory.push(...prevState.matchHistory);

        selectedSeasonData = prevState.selectedSeasonData;

        updateDisplay();
    }

    function vote(indexOffset) {
        saveState();

        const p1 = currentRound[currentIndex];
        const p2 = currentRound[currentIndex + 1];

        const winner = indexOffset === 0 ? p1 : p2;
        const loser = indexOffset === 0 ? p2 : p1;

        matchHistory.push({
            roundSize: currentRound.length,
            p1: { ...p1 },
            p2: { ...p2 },
            winnerTitle: winner.title
        });

        loser.result = getEliminationStageName(currentRound.length);

        nextRound.push(winner);
        currentIndex += 2;

        if (currentIndex >= currentRound.length) {
            currentRound = [...nextRound];
            nextRound = [];
            currentIndex = 0;
        }
        updateDisplay();
    }

    function getRoundTitle(n) {
        if (n === 64) return "32èmes de Finale";
        if (n === 32) return "16èmes de Finale";
        if (n === 16) return "8èmes de Finale";
        if (n === 8) return "Quarts de Finale";
        if (n === 4) return "Demi-Finales";
        if (n === 2) return "GRANDE FINALE";
        return `Tour de ${n}`;
    }

    function getEliminationStageName(n) {
        if (n === 64) return "Top 64 (32èmes)";
        if (n === 32) return "Top 32 (16èmes)";
        if (n === 16) return "Top 16 (8èmes)";
        if (n === 8) return "Top 8 (Quarts)";
        if (n === 4) return "Top 4 (Demi-Finales)";
        if (n === 2) return "Finaliste (2ème)";
        return "Éliminé";
    }

    function showWinner(winner) {
        winner.result = "🏆 CHAMPION 🏆";

        document.getElementById('tournament-screen').classList.add('hidden');
        document.getElementById('match-info').classList.add('hidden');
        document.getElementById('round-name').classList.add('hidden');
        document.getElementById('undo-btn').classList.add('hidden');
        document.getElementById('winner-screen').style.display = 'block';
        document.getElementById('title-winner').innerText = winner.title;
        
        document.getElementById('player-winner').innerHTML = `
            <iframe src="https://www.youtube-nocookie.com/embed/${winner.yt}?autoplay=1" allowfullscreen></iframe>
            <div style="margin-top: 8px; display: flex; flex-direction: column; gap: 5px; align-items: center;">
                <a class="yt-link" href="https://www.youtube.com/watch?v=${winner.yt}" target="_blank">
                    Ouvrir sur YouTube ↗
                </a>
                <button class="switch-btn" id="switch-btn-winner" onclick="switchWinnerPlayer('${winner.yt}')">
                    <span id="switch-text-winner">Lecteur alternatif si bloqué 🔁</span>
                </button>
            </div>
        `;

        generateRecap();
    }

    // Génère l'Arbre Graphique Universel et Dynamique pour n'importe quelle taille N (Puissance de 2)
    function generateBracketVisual() {
        const tree = [];
        // Niveau 0 : Distribution initiale
        tree[0] = initialShuffled.map(e => ({ ...e }));

        const N = initialShuffled.length;
        const k = Math.log2(N); // Ex: 6 pour 64, 5 pour 32, 4 pour 16

        // Reconstitution mathématique des paliers intermédiaires
        for (let lvl = 1; lvl <= k; lvl++) {
            tree[lvl] = [];
            const prevLvl = tree[lvl - 1];
            for (let i = 0; i < prevLvl.length; i += 2) {
                const p1 = prevLvl[i];
                const p2 = prevLvl[i + 1];
                if (!p2) {
                    tree[lvl].push({ ...p1 });
                    continue;
                }
                
                const match = matchHistory.find(m => 
                    (m.p1.title === p1.title && m.p2.title === p2.title) ||
                    (m.p1.title === p2.title && m.p2.title === p1.title)
                );
                
                if (match) {
                    // Retrouve le morceau correspondant dans l'état de fin de jeu
                    const winnerObj = initialShuffled.find(e => e.title === match.winnerTitle) || p1;
                    tree[lvl].push({ ...winnerObj });
                } else {
                    tree[lvl].push({ title: "En attente", yt: "", placeholder: true });
                }
            }
        }
        
        // Distribution dynamique des colonnes de manière symétrique selon N
        const columns = {};
        // Partie Gauche de lvl 0 à k-1
        for (let j = 0; j < k; j++) {
            const halfSize = Math.pow(2, k - 1 - j);
            columns[`L-${j}`] = tree[j].slice(0, halfSize);
        }
        // Centre (Champion)
        columns[`C-${k}`] = tree[k];
        // Partie Droite de lvl k-1 à 0 (Inversée pour la symétrie)
        for (let j = k - 1; j >= 0; j--) {
            const halfSize = Math.pow(2, k - 1 - j);
            const fullSize = Math.pow(2, k - j);
            columns[`R-${j}`] = tree[j].slice(halfSize, fullSize);
        }

        // Calcul dynamique de la hauteur du bracket
        const wrapperHeight = (N / 2) * 75;

        let bracketHtml = `
            <div class="bracket-scroll">
                <div class="bracket-wrapper" style="height: ${wrapperHeight}px;">
                    <svg id="bracket-lines" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; stroke: #475569; stroke-width: 2; fill: none;"></svg>
        `;

        Object.keys(columns).forEach(colKey => {
            const list = columns[colKey];
            const [side, lvlStr] = colKey.split('-');
            const lvl = parseInt(lvlStr);
            
            bracketHtml += `<div class="bracket-column">`;
            
            list.forEach((node, idx) => {
                const nodeId = `${side}-${lvl}-${idx}`;
                const isPlaceholder = node.placeholder || !node.yt;
                const thumbUrl = isPlaceholder ? "" : `https://img.youtube.com/vi/${node.yt}/mqdefault.jpg`;
                const isStarred = node.starred;
                
                // Cases à hauteur double pour tous les tours au-delà du premier (lvl 0)
                const isTall = lvl !== 0;
                
                bracketHtml += `
                    <div class="bracket-node ${isStarred ? 'node-starred' : ''} ${isTall ? 'bracket-node-tall' : ''}" id="${nodeId}">
                        ${isPlaceholder ? `
                            <div style="background: #0f172a; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #475569;">
                                <span>-</span>
                            </div>
                        ` : `
                            <img src="${thumbUrl}" crossorigin="anonymous" alt="" />
                            <div class="node-title" title="${node.title}">
                                ${isStarred ? '⭐ ' : ''}${node.title}
                            </div>
                        `}
                    </div>
                `;
            });
            
            bracketHtml += `</div>`;
        });

        bracketHtml += `
                </div>
            </div>
        `;
        return bracketHtml;
    }

    function drawBracketLines() {
        const svg = document.getElementById('bracket-lines');
        if (!svg) return;
        svg.innerHTML = ''; 
        const wrapperRect = document.querySelector('.bracket-wrapper').getBoundingClientRect();

        const N = initialShuffled.length;
        const k = Math.log2(N);

        // Connexions gauches
        for (let lvl = 0; lvl < k - 1; lvl++) {
            const count = Math.pow(2, k - 1 - lvl);
            for (let i = 0; i < count; i++) {
                connectNodes(`L-${lvl}-${i}`, `L-${lvl+1}-${Math.floor(i/2)}`, svg, wrapperRect);
            }
        }
        connectNodes(`L-${k-1}-0`, `C-${k}-0`, svg, wrapperRect);

        // Connexions droites
        for (let lvl = 0; lvl < k - 1; lvl++) {
            const count = Math.pow(2, k - 1 - lvl);
            for (let i = 0; i < count; i++) {
                connectNodes(`R-${lvl}-${i}`, `R-${lvl+1}-${Math.floor(i/2)}`, svg, wrapperRect);
            }
        }
        connectNodes(`R-${k-1}-0`, `C-${k}-0`, svg, wrapperRect);
    }

    function connectNodes(childId, parentId, svg, wrapperRect) {
        const childEl = document.getElementById(childId);
        const parentEl = document.getElementById(parentId);
        if (!childEl || !parentEl) return;

        const childRect = childEl.getBoundingClientRect();
        const parentRect = parentEl.getBoundingClientRect();

        const childX = childRect.left - wrapperRect.left;
        const childY = childRect.top - wrapperRect.top;
        const parentX = parentRect.left - wrapperRect.left;
        const parentY = parentRect.top - wrapperRect.top;

        const isLeftTree = childId.startsWith('L');
        let startX, startY, endX, endY;

        if (isLeftTree) {
            startX = childX + childRect.width;
            startY = childY + childRect.height / 2;
            endX = parentX;
            endY = parentY + parentRect.height / 2;
        } else {
            startX = childX;
            startY = childY + childRect.height / 2;
            endX = parentX + parentRect.width;
            endY = parentY + parentRect.height / 2;
        }

        const midX = (startX + endX) / 2;
        const pathData = `M ${startX} ${startY} L ${midX} ${startY} L ${midX} ${endY} L ${endX} ${endY}`;
        
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', pathData);
        path.setAttribute('stroke', '#475569');
        path.setAttribute('stroke-width', '2');
        path.setAttribute('fill', 'none');
        svg.appendChild(path);
    }

    function downloadBracket() {
        const container = document.querySelector('.bracket-wrapper');
        if (!container) return;

        const btn = document.querySelector('.download-btn');
        btn.innerText = "Génération de l'image... ⏳";
        btn.disabled = true;

        html2canvas(container, {
            backgroundColor: "#090d16",
            useCORS: true, 
            scale: 1.5 
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'recap-tournoi.png';
            link.href = canvas.toDataURL();
            link.click();
            
            btn.innerText = "📸 Télécharger le Schéma (PNG)";
            btn.disabled = false;
        }).catch(err => {
            console.error("Erreur de téléchargement du canevas", err);
            btn.innerText = "Erreur ❌";
            btn.disabled = false;
        });
    }

    function generateRecap() {
        const starredEntries = initialShuffled.filter(e => e.starred);
        let starredHtml = "";
        if (starredEntries.length > 0) {
            starredHtml = `
                <div class="recap-section">
                    <h3>⭐ VOS MORCEAUX MARQUÉS (Étoilés)</h3>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                        ${starredEntries.map(e => `
                            <div class="fav-badge">⭐ ${e.title} <span style="font-size: 0.8rem; opacity: 0.75; margin-left:5px;">(${e.result})</span></div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        const bracketVisualHtml = `
            <div class="recap-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap:10px;">
                    <h3>🌿 GRAPH SCHÉMATIQUE DU TOURNOI</h3>
                    <button class="download-btn" onclick="downloadBracket()">📸 Télécharger le Schéma (PNG)</button>
                </div>
                ${generateBracketVisual()}
            </div>
        `;

        // Liste dynamique des rounds à tracer en texte
        const N = initialShuffled.length;
        const roundsToRender = [];
        let temp = N;
        while (temp >= 2) {
            roundsToRender.push(temp);
            temp /= 2;
        }

        let bracketHtml = `
            <div class="recap-section">
                <h3>📜 HISTORIQUE DU COMPTE RENDU DES MATCHS</h3>
                <div class="rounds-container">
        `;

        roundsToRender.forEach(rSize => {
            const roundMatches = matchHistory.filter(m => m.roundSize === rSize);
            if (roundMatches.length === 0) return;

            const rTitle = getRoundTitle(rSize);
            const isCollapsedByDefault = rSize === 64 || rSize === 32;
            const displayStyle = isCollapsedByDefault ? "none" : "grid";

            bracketHtml += `
                <div class="round-box">
                    <h4 onclick="toggleCollapse('round-${rSize}')">
                        <span>${rTitle} (${roundMatches.length} Match${roundMatches.length > 1 ? 's' : ''})</span>
                        <span style="font-size: 0.8rem; opacity: 0.6; font-weight: normal;">[Cliquer pour afficher/masquer]</span>
                    </h4>
                    <div id="round-${rSize}" class="round-matches-list" style="display: ${displayStyle};">
                        ${roundMatches.map((m, i) => {
                            const isP1Winner = m.p1.title === m.winnerTitle;
                            return `
                                <div class="match-recap-row">
                                    <span class="match-recap-num">Match ${i + 1}</span>
                                    <div style="display: flex; justify-content: space-between; align-items: center; gap: 5px;">
                                        <span class="match-recap-player ${isP1Winner ? 'winner' : 'loser'}" title="${m.p1.title}">
                                            ${m.p1.starred ? '⭐ ' : ''}${m.p1.title}
                                        </span>
                                        <span class="match-recap-vs">VS</span>
                                        <span class="match-recap-player ${!isP1Winner ? 'winner' : 'loser'}" title="${m.p2.title}">
                                            ${m.p2.starred ? '⭐ ' : ''}${m.p2.title}
                                        </span>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        });

        bracketHtml += `</div></div>`;

        const rankWeight = {
            "🏆 CHAMPION 🏆": 1,
            "Finaliste (2ème)": 2,
            "Top 4 (Demi-Finales)": 3,
            "Top 8 (Quarts)": 4,
            "Top 16 (8èmes)": 5,
            "Top 32 (16èmes)": 6,
            "Top 64 (32èmes)": 7
        };

        const sortedEntries = [...initialShuffled].sort((a, b) => {
            return (rankWeight[a.result] || 9) - (rankWeight[b.result] || 9);
        });

        let tableHtml = `
            <div class="recap-section">
                <h3>📊 CLASSEMENT GÉNÉRAL DES PARTICIPANTS</h3>
                <table class="recap-table">
                    <thead>
                        <tr>
                            <th style="width: 80px; text-align: center;">Marqué</th>
                            <th>Titre de l'Anime / Musique</th>
                            <th>Résultat / Parcours</th>
                            <th style="width: 140px; text-align: center;">Lien direct</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${sortedEntries.map(e => {
                            let statusClass = "";
                            if (e.result === "🏆 CHAMPION 🏆") statusClass = "status-winner";
                            else if (e.result === "Finaliste (2ème)") statusClass = "status-finalist";
                            
                            return `
                                <tr>
                                    <td style="text-align: center; font-size: 1.1rem;">${e.starred ? '⭐' : '☆'}</td>
                                    <td style="font-weight: ${e.result === '🏆 CHAMPION 🏆' ? 'bold' : 'normal'}">${e.title}</td>
                                    <td class="${statusClass}">${e.result}</td>
                                    <td style="text-align: center;">
                                        <a class="yt-link" href="https://www.youtube.com/watch?v=${e.yt}" target="_blank" style="padding: 4px 8px; font-size: 0.8rem; margin: 0;">
                                            Regarder ↗
                                        </a>
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        `;

        document.getElementById('tournament-recap-container').innerHTML = starredHtml + bracketVisualHtml + bracketHtml + tableHtml;

        setTimeout(() => {
            drawBracketLines();
        }, 150);
    }

    window.addEventListener('resize', () => {
        drawBracketLines();
    });

    // Chargement initial des compteurs du menu de configuration
    updateCountLabel();
</script>
</body>
</html>
